name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-electron:
    name: Build Electron app (${{ matrix.os }}-${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
            artifact: aria-chat-portable-linux-x64.tar.gz
          - runner: ubuntu-latest
            os: linux
            arch: arm64
            artifact: aria-chat-portable-linux-arm64.tar.gz
          - runner: macos-latest
            os: darwin
            arch: x64
            artifact: aria-chat-portable-darwin-x64.zip
          - runner: macos-latest
            os: darwin
            arch: arm64
            artifact: aria-chat-portable-darwin-arm64.zip
          - runner: windows-latest
            os: win32
            arch: x64
            artifact: aria-chat-portable-win32-x64.zip
          - runner: windows-latest
            os: win32
            arch: arm64
            artifact: aria-chat-portable-win32-arm64.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install monorepo deps
        run: bun install
        shell: bash

      - name: Get version
        id: version
        run: |
          VERSION=$(cat packages/opencode/package.json | jq -r '.version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build server binary (native)
        run: bun run script/build.ts --single
        working-directory: packages/opencode
        shell: bash

      - name: Install desktop deps
        run: npm install
        working-directory: desktop
        shell: bash

      - name: Verify Electron installation
        run: |
          ls -la node_modules/electron/dist/
          test -f node_modules/electron/dist/electron && echo "Electron found" || (echo "Electron NOT found, reinstalling..." && npm install --force)
        working-directory: desktop
        shell: bash

      - name: Build Electron app
        run: npx electron-vite build
        working-directory: desktop
        shell: bash

      - name: Package portable
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            pwsh -File script/pack-portable.ps1 -SkipBuild
          else
            bash script/pack-portable.sh --skip-build
          fi
        working-directory: desktop
        env:
          SERVER_OS: ${{ matrix.os }}
          SERVER_ARCH: ${{ matrix.arch }}
        shell: bash

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop/${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build-electron
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: aria-chat-portable-*
          merge-multiple: true

      - name: List assets
        run: ls -la release-assets/
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          draft: false
          prerelease: false