name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-electron:
    name: Build Electron app (${{ matrix.os }}-${{ matrix.arch }}${{ matrix.baseline && '-baseline' || '' }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x64
            artifact: aria-chat-portable-linux-x64.tar.gz
          - runner: ubuntu-latest
            os: linux
            arch: arm64
            artifact: aria-chat-portable-linux-arm64.tar.gz
          - runner: macos-latest
            os: darwin
            arch: x64
            artifact: aria-chat-portable-darwin-x64.zip
          - runner: macos-latest
            os: darwin
            arch: arm64
            artifact: aria-chat-portable-darwin-arm64.zip
          - runner: windows-latest
            os: win32
            arch: x64
            artifact: aria-chat-portable-win32-x64.zip
          # Baseline Windows build is removed — Bun v1.3.x doesn't distribute
          # the baseline runtime binary for Windows x64.
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install monorepo deps
        run: bun install
        shell: bash

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Debug desktop node_modules before install
        run: |
          echo "=== desktop/node_modules before install ==="
          ls -la desktop/node_modules/ 2>/dev/null || echo "node_modules does not exist"
          echo "=== desktop/node_modules/electron ==="
          ls -la desktop/node_modules/electron/ 2>/dev/null || echo "electron not found"
        shell: bash

      - name: Install desktop deps
        run: npm install --prefer-offline=false
        working-directory: desktop
        shell: bash

      - name: Debug Electron installation
        run: |
          echo "=== Checking node_modules/electron ==="
          ls -la node_modules/electron/
          echo "=== Checking node_modules/electron/dist ==="
          ls -la node_modules/electron/dist/
        working-directory: desktop
        shell: bash

      - name: Verify Electron installation
        run: |
          if [[ "$(uname -s)" == "Darwin" ]]; then
            # macOS: Electron is distributed as an .app bundle
            if [ ! -f node_modules/electron/dist/Electron.app/Contents/MacOS/Electron ]; then
              echo "Electron NOT found, reinstalling..."
              npm install --force
              ls -la node_modules/electron/dist/
            else
              echo "Electron found at node_modules/electron/dist/Electron.app/Contents/MacOS/Electron"
            fi
          else
            # Linux/Windows: Electron binary is at dist/electron or dist/electron.exe
            if [ ! -f node_modules/electron/dist/electron ] && [ ! -f node_modules/electron/dist/electron.exe ]; then
              echo "Electron NOT found, reinstalling..."
              npm install --force
              ls -la node_modules/electron/dist/
            else
              echo "Electron found"
            fi
          fi
        working-directory: desktop
        shell: bash

      - name: Build Electron app
        run: npx electron-vite build
        working-directory: desktop
        shell: bash

      - name: Package portable
        run: |
          BASELINE_FLAG=""
          if [[ "${{ matrix.baseline }}" == "true" ]]; then
            BASELINE_FLAG="--baseline"
          fi
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            pwsh -File script/pack-portable.ps1 $BASELINE_FLAG
          else
            bash script/pack-portable.sh $BASELINE_FLAG
          fi
        working-directory: desktop
        env:
          SERVER_OS: ${{ matrix.os }}
          SERVER_ARCH: ${{ matrix.arch }}
        shell: bash

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop/${{ matrix.artifact }}
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build-electron
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Determine release tag
        id: release_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="v${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
        shell: bash

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: aria-chat-portable-*
          merge-multiple: true

      - name: List assets
        run: ls -la release-assets/
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          files: release-assets/*
          draft: false
          prerelease: false